<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Redirecting to Keshika Verma’s New Website</title>

  <meta http-equiv="refresh" content="0; url=https://keshika.netlify.app" />
  <link rel="canonical" href="https://keshika.netlify.app" />

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: Arial, sans-serif;
      text-align: center;
      color: white;
      background: linear-gradient(135deg, #2c0054, #55148a, #32005f);
    }

    .redirect-box {
      max-width: 760px;
    }

    h1 {
      font-size: clamp(2.4rem, 7vw, 5.5rem);
      margin-bottom: 18px;
    }

    p {
      font-size: 1.2rem;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    a {
      display: inline-block;
      padding: 22px 38px;
      border-radius: 999px;
      background: #fff36d;
      color: #32005f;
      font-size: clamp(1.2rem, 4vw, 2rem);
      font-weight: bold;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div class="redirect-box">
    <h1>This website has moved.</h1>
    <p>
      Please visit the new and updated website.
    </p>
    <a href="https://keshika.netlify.app">
      Go to the New Website →
    </a>
  </div>

  <script>
    window.location.replace("https://keshika.netlify.app");
  </script>
</body>
</html>
